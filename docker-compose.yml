services:
  gateway:
    build: ./gateway
    expose:
      - "3000"
    environment:
      PORT: 3000
      PHP_API_URL: http://php-api
      PYTHON_ML_URL: http://python-ml:8000
    depends_on:
      - php-api
      - python-ml
    networks:
      - default
      - dokploy-network

  php-api:
    build: ./php-api
    environment:
      DB_HOST: mysql
      DB_NAME: miniscrum
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      - mysql

  python-ml:
    build: ./python-ml

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: miniscrum
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:

networks:
  default:
  dokploy-network:
    external: true
